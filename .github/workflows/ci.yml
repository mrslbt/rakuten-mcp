name: CI

on:
  push:
    branches:
      - main
      - 'v1.0-*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: typecheck + tests + build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test — stdio boots cleanly
        run: |
          ( echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' ; sleep 1 ) | node dist/index.js > /tmp/out.txt 2> /tmp/err.txt
          cat /tmp/err.txt
          echo "--- response ---"
          cat /tmp/out.txt
          grep -q '"name":"rakuten-mcp"' /tmp/out.txt
